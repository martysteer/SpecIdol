<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Judge - SPECULATIVE IDOL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"></noscript>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="modal.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #0f0;
            font-family: 'Press Start 2P', cursive;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            padding: 1rem;
            text-align: center;
            border-bottom: 2px solid #0f0;
        }

        .code {
            font-size: var(--text-caption);
            opacity: 0.7;
        }

        .judge-count {
            font-size: var(--text-caption);
            opacity: 0.5;
            margin-top: 0.25rem;
        }

        .judge-num {
            font-size: var(--text-heading);
            margin: 0.5rem 0;
        }

        .story-title {
            font-size: var(--text-body);
            margin-top: 0.5rem;
            color: #ff0;
        }

        .timer {
            font-family: 'Press Start 2P', cursive;
            font-size: var(--text-display);
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
            line-height: 1.2;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .buzz-button {
            width: 80vmin;
            height: 80vmin;
            max-width: 400px;
            max-height: 400px;
            background: linear-gradient(145deg, #ff0000, #cc0000);
            border: 8px solid #800000;
            border-radius: 50%;
            font-family: 'Press Start 2P', cursive;
            font-size: var(--text-display);
            color: #fff;
            cursor: pointer;
            box-shadow: 0 15px 30px rgba(255, 0, 0, 0.5),
                        inset 0 -8px 20px rgba(0, 0, 0, 0.3),
                        inset 0 8px 20px rgba(255, 255, 255, 0.2);
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            line-height: 1.3;
        }

        .buzz-button:active {
            transform: scale(0.95);
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.5),
                        inset 0 -4px 10px rgba(0, 0, 0, 0.3),
                        inset 0 4px 10px rgba(255, 255, 255, 0.2);
        }

        .buzz-button:disabled {
            background: #333;
            border-color: #666;
            cursor: not-allowed;
            box-shadow: none;
        }

        .buzzed {
            font-size: 6rem;
            color: #f00;
            animation: buzzAnim 0.5s ease-out;
        }

        @keyframes buzzAnim {
            0% { transform: scale(0) rotate(-45deg); opacity: 0; }
            50% { transform: scale(1.2) rotate(5deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .judge-status {
            margin-top: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            align-items: center;
        }

        .buzz-count {
            font-size: var(--text-caption);
            opacity: 0.7;
            color: #0f0;
        }

        .buzz-count.active {
            opacity: 1;
            color: #ff0;
        }

        .judge-indicators {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
        }

        .judge-indicator {
            padding: 0.5rem;
            border: 2px solid #0f0;
            font-size: var(--text-caption);
            opacity: 0.5;
            transition: all 0.3s;
        }

        .judge-indicator.buzzed {
            color: #f00;
            border-color: #f00;
            opacity: 1;
            animation: buzzPulse 0.5s ease-out;
        }

        @keyframes buzzPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); box-shadow: 0 0 20px #f00; }
            100% { transform: scale(1); }
        }

        .waiting {
            font-size: var(--text-body);
            text-align: center;
            opacity: 0.7;
        }

        .footer {
            padding: 1rem;
            border-top: 2px solid #0f0;
        }

        @media (max-width: 600px) {
            :root {
                --text-display: 1.5rem;
                --text-heading: 1.125rem;
                --text-body: 0.875rem;
                --text-caption: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="code" id="code">session code: ----</div>
        <div class="judge-count" id="judgeCount">- judges connected</div>
        <div class="judge-num" id="judgeNum" onclick="openNameEditor()" style="cursor:pointer;text-decoration:underline;text-decoration-style:dotted;">Judge -</div>
        <div class="story-title" id="storyTitle"></div>
    </div>

    <div class="main" id="main">
        <div class="waiting">Waiting for round to start...</div>
    </div>

    <div class="footer">
        <div class="timer" id="timer">0:00.0</div>
    </div>

    <!-- Name Editor Modal -->
    <div class="modal-overlay" id="nameModalOverlay">
        <div class="modal-box">
            <div class="modal-message">Who do you think you are?</div>
            <div style="padding:1rem 0;">
                <input type="text" id="nameInput" maxlength="20" style="width:100%;font-family:'Press Start 2P',cursive;font-size:var(--text-caption);" placeholder="Your name">
            </div>
            <div class="modal-buttons">
                <button class="modal-btn" id="nameSaveBtn">SAVE</button>
                <button class="modal-btn cancel" id="nameCancelBtn">Cancel</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        const params = getUrlParams();
        const client = new SpecIdolClient();
        let timer = null;
        let buzzed = false;
        let timerDuration = 120;
        let myJudgeId = null;
        let myJudgeName = null;
        let connectedJudges = [];  // [{id, name}, ...]

        // localStorage: read saved name (2hr expiry)
        const TWO_HOURS = 2 * 60 * 60 * 1000;
        function getSavedName() {
            try {
                const stored = JSON.parse(localStorage.getItem('specidol_judge_name'));
                if (stored && (Date.now() - stored.timestamp) < TWO_HOURS) {
                    return stored.name;
                }
                localStorage.removeItem('specidol_judge_name');
            } catch (e) {}
            return null;
        }
        function saveName(name) {
            localStorage.setItem('specidol_judge_name', JSON.stringify({
                name: name,
                timestamp: Date.now()
            }));
        }

        const savedName = getSavedName();

        client.connect();

        client.onConnect = () => {
            client.joinSession(params.code, 'judge', null, savedName);
        };

        client.on('session_state', (data) => {
            if (data.server_time) updateClockOffset(data.server_time);
            if (data.config && data.config.timer_duration) {
                timerDuration = data.config.timer_duration;
            }
            // Update judge info from server
            if (data.client_info && data.client_info.judge_id) {
                myJudgeId = data.client_info.judge_id;
                document.getElementById('code').textContent = `session code: ${data.code || '----'}`;
            }
            // Update connected judges and own name
            if (data.connected_judges) {
                connectedJudges = data.connected_judges;
                const me = connectedJudges.find(j => j.id === myJudgeId);
                if (me) {
                    myJudgeName = me.name;
                    document.getElementById('judgeNum').textContent = `${myJudgeName}`;
                }
                updateJudgeCount();
            }
            const round = data.current_round;
            if (round.status === 'running' || round.status === 'paused') {
                startRound(round);
                // Replay existing buzzes
                if (round.buzzes) {
                    round.buzzes.forEach(b => {
                        updateJudgeStatus(b.judge_id);
                        if (b.judge_id === myJudgeId) {
                            buzzed = true;
                            const button = document.getElementById('buzzButton');
                            if (button) {
                                button.disabled = true;
                                button.innerHTML = '<div class="buzzed">✕</div>';
                            }
                        }
                    });
                }
                if (round.status === 'paused') {
                    if (timer) timer.pause();
                    const button = document.getElementById('buzzButton');
                    if (button && !buzzed) {
                        button.disabled = true;
                    }
                }
            } else if (round.status === 'defeat' || round.status === 'victory') {
                startRound(round);
                if (round.buzzes) {
                    round.buzzes.forEach(b => updateJudgeStatus(b.judge_id));
                }
                if (timer) timer.stop();
            }
        });

        client.on('round_started', (data) => {
            if (data.server_time) updateClockOffset(data.server_time);
            startRound(data);
        });

        client.on('paused', (data) => {
            if (timer) timer.pause();
            const button = document.getElementById('buzzButton');
            if (button && !buzzed) {
                button.disabled = true;
            }
        });

        client.on('resumed', (data) => {
            if (timer) timer.resume(data.timestamp - data.elapsed);
            const button = document.getElementById('buzzButton');
            if (button && !buzzed) {
                button.disabled = false;
            }
        });

        client.on('speed_changed', (data) => {
            // Speed doesn't affect judge view, but we track it
        });

        client.on('buzzed', (data) => {
            updateJudgeStatus(data.judge_id);
        });

        client.on('round_ended', (data) => {
            if (timer) timer.stop();
        });

        client.on('round_reset', () => {
            resetView();
        });

        client.on('ejected', async (data) => {
            await customAlert(data.message || 'You have been ejected from the session');
            window.location.href = 'index.html';
        });

        client.on('session_deleted', async (data) => {
            await customAlert(data.message || 'Session has been deleted');
            window.location.href = 'index.html';
        });

        client.on('judge_joined', (data) => {
            if (data.connected_judges) {
                connectedJudges = data.connected_judges;
                updateJudgeCount();
                renderJudgeStatus();
            }
        });

        client.on('judge_left', (data) => {
            if (data.connected_judges) {
                connectedJudges = data.connected_judges;
                updateJudgeCount();
                renderJudgeStatus();
            }
        });

        client.on('judge_name_changed', (data) => {
            if (data.connected_judges) {
                connectedJudges = data.connected_judges;
            }
            if (data.judge_id === myJudgeId) {
                myJudgeName = data.name;
                document.getElementById('judgeNum').textContent = `${myJudgeName}`;
            }
            renderJudgeStatus();
        });

        function startRound(roundData) {
            buzzed = false;
            document.getElementById('storyTitle').textContent = roundData.title || '';

            const main = document.getElementById('main');
            main.innerHTML = `
                <button class="buzz-button" id="buzzButton" onclick="buzz()">
                    BUZZ
                </button>
                <div class="judge-status" id="judgeStatus"></div>
            `;

            renderJudgeStatus();

            if (timer) timer.stop();
            timer = new Timer(
                timerDuration,
                (elapsed) => {
                    document.getElementById('timer').textContent = formatTime(elapsed);
                },
                () => {
                    // Timer complete (victory)
                }
            );
            timer.start(roundData.start_time);
        }

        function buzz() {
            if (buzzed) return;
            buzzed = true;

            const button = document.getElementById('buzzButton');
            button.disabled = true;
            button.innerHTML = '<div class="buzzed">✕</div>';

            client.buzz(myJudgeId);
        }

        function renderJudgeStatus() {
            const container = document.getElementById('judgeStatus');
            if (!container) return;

            const initials = calculateInitials(connectedJudges);

            const buzzedCount = connectedJudges.filter(j => {
                const el = document.querySelector(`[data-judge="${j.id}"]`);
                return el && el.classList.contains('buzzed');
            }).length;

            const totalCount = connectedJudges.length;
            const buzzCountClass = buzzedCount > 0 ? 'active' : '';

            container.innerHTML = `
                <div class="buzz-count ${buzzCountClass}" id="buzzCountDisplay">${buzzedCount} of ${totalCount} buzzed</div>
                <div class="judge-indicators">
                    ${connectedJudges.map(j => `
                        <div class="judge-indicator" data-judge="${j.id}">${initials[j.id]}</div>
                    `).join('')}
                </div>
            `;
        }

        function updateJudgeCount() {
            const countEl = document.getElementById('judgeCount');
            if (countEl) {
                const count = connectedJudges.length;
                countEl.textContent = `${count} ${count === 1 ? 'judge' : 'judges'} connected`;
            }
        }

        function updateBuzzCount() {
            const buzzCountEl = document.getElementById('buzzCountDisplay');
            if (!buzzCountEl) return;

            const buzzedCount = document.querySelectorAll('.judge-indicator.buzzed').length;
            const totalCount = connectedJudges.length;

            buzzCountEl.textContent = `${buzzedCount} of ${totalCount} buzzed`;

            if (buzzedCount > 0) {
                buzzCountEl.classList.add('active');
            }
        }

        function updateJudgeStatus(judgeId) {
            const indicator = document.querySelector(`[data-judge="${judgeId}"]`);
            if (indicator) {
                indicator.classList.add('buzzed');
                updateBuzzCount();
            }
        }

        function resetView() {
            if (timer) timer.stop();
            buzzed = false;
            document.getElementById('storyTitle').textContent = '';
            document.getElementById('timer').textContent = '0:00.0';
            document.getElementById('main').innerHTML = '<div class="waiting">Waiting for round to start...</div>';
        }

        // Name editor modal
        function openNameEditor() {
            const overlay = document.getElementById('nameModalOverlay');
            const input = document.getElementById('nameInput');
            input.value = myJudgeName || '';
            overlay.classList.add('active');
            input.focus();
        }

        document.getElementById('nameSaveBtn').addEventListener('click', () => {
            const name = document.getElementById('nameInput').value.trim().slice(0, 20);
            if (name) {
                myJudgeName = name;
                saveName(name);
                client.setJudgeName(name);
                document.getElementById('judgeNum').textContent = name;
            }
            document.getElementById('nameModalOverlay').classList.remove('active');
        });

        document.getElementById('nameCancelBtn').addEventListener('click', () => {
            document.getElementById('nameModalOverlay').classList.remove('active');
        });

        // Allow Enter to save, Escape to cancel
        document.getElementById('nameInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('nameSaveBtn').click();
            if (e.key === 'Escape') document.getElementById('nameCancelBtn').click();
        });
    </script>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <div class="modal-message" id="modalMessage"></div>
            <div class="modal-buttons">
                <button class="modal-btn" id="modalOk">OK</button>
                <button class="modal-btn cancel" id="modalCancel">Cancel</button>
            </div>
        </div>
    </div>

    <script src="modal.js"></script>
</body>
</html>
