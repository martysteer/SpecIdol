<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audience - SPECULATIVE IDOL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="modal.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* CRT scanline effect */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1),
                rgba(0, 0, 0, 0.1) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 1000;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .story-title {
            font-family: 'Press Start 2P', cursive;
            font-size: var(--text-display);
            color: #ff0;
            text-shadow: 0 0 10px #ff0;
            line-height: 1.2;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .story-text-container {
            flex: 1;
            overflow-y: auto;
            scroll-behavior: smooth;
            border: 2px solid #0f0;
            padding: 2rem;
            margin-bottom: 2rem;
            position: relative;
        }

        .story-text {
            font-size: 2rem;
            line-height: 1.7;
            white-space: pre-wrap;
        }

        .text-line {
            display: block;
            opacity: 0;
            transform: translateY(20px);
            animation: lineAppear 0.5s ease-out forwards;
        }

        @keyframes lineAppear {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
        }

        .timer {
            font-family: 'Press Start 2P', cursive;
            font-size: var(--text-display);
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
            line-height: 1.2;
        }

        .timer.tension {
            color: #f00;
            animation: pulse 0.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }

        .judge-panels {
            display: flex;
            gap: 1rem;
        }

        .judge-panel {
            border: 3px solid #0f0;
            padding: 1rem 2rem;
            font-family: 'Press Start 2P', cursive;
            font-size: var(--text-heading);
            box-shadow: 0 0 15px #0f0;
            transition: all 0.3s;
        }

        .judge-panel.buzzed {
            border-color: #f00;
            color: #f00;
            box-shadow: 0 0 15px #f00;
            position: relative;
        }

        .judge-panel .x {
            display: none;
            font-size: calc(var(--text-display) * 2);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .judge-panel.buzzed .x {
            display: block;
            animation: xSlam 0.5s ease-out;
        }

        @keyframes xSlam {
            0% { transform: translate(-50%, -50%) scale(0) rotate(-45deg); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.3) rotate(5deg); }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
        }

        .judge-panel.buzzed .label {
            opacity: 0.3;
        }

        .outcome {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Press Start 2P', cursive;
            font-size: calc(var(--text-display) * 2.5);
            z-index: 100;
            text-align: center;
            line-height: 1.2;
        }

        .outcome.victory {
            color: #0f0;
            text-shadow: 0 0 20px #0f0;
            animation: victoryAnim 1s ease-out;
        }

        .outcome.defeat {
            color: #f00;
            text-shadow: 0 0 20px #f00;
            animation: defeatAnim 0.8s ease-out;
        }

        @keyframes victoryAnim {
            0% { transform: translate(-50%, -50%) scale(0) rotate(-10deg); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2) rotate(5deg); }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
        }

        @keyframes defeatAnim {
            0% { transform: translate(-50%, -100vh); opacity: 0; }
            60% { transform: translate(-50%, -40%); opacity: 1; }
            100% { transform: translate(-50%, -50%); }
        }

        body.defeat-flash {
            animation: flashRed 0.5s;
        }

        @keyframes flashRed {
            0%, 100% { background: #000; }
            50% { background: #300; }
        }

        @media (max-width: 900px) {
            :root {
                --text-display: 1.5rem;
                --text-heading: 1.125rem;
                --text-subheading: 1rem;
                --text-body: 0.875rem;
                --text-caption: 0.75rem;
            }

            .judge-panel {
                padding: 0.5rem 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="story-title" id="storyTitle">Waiting for story...</div>
        </div>

        <div class="content">
            <div class="story-text-container">
                <div class="story-text" id="storyText"></div>
            </div>
        </div>

        <div class="footer">
            <div class="timer" id="timer" style="display: none;">0:00.0</div>
            <div class="judge-panels" id="judgePanels"></div>
        </div>
    </div>

    <div class="outcome" id="outcome"></div>

    <div id="audioOverlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:2000;display:flex;align-items:center;justify-content:center;cursor:pointer;" onclick="enableAudio()">
        <div style="font-family:'Press Start 2P',cursive;color:#0f0;text-align:center;font-size:var(--text-heading);line-height:1.5;">
            SPECULATIVE IDOL<br><br>
            <span style="font-size:var(--text-caption);opacity:0.7;">Click anywhere to enable audio</span>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        const params = getUrlParams();
        const client = new SpecIdolClient();
        let timer = null;
        let scroller = null;
        let tensionMode = false;
        let timerDuration = 120; // default, updated from config

        client.connect();

        client.onConnect = () => {
            client.joinSession(params.code, 'audience');
        };

        client.on('session_state', (data) => {
            if (data.server_time) updateClockOffset(data.server_time);
            if (data.config && data.config.timer_duration) {
                timerDuration = data.config.timer_duration;
            }
            // Render judge panels based on connected judges
            if (data.connected_judges) {
                renderJudgePanels(data.connected_judges);
            }
            const round = data.current_round;
            if (round.status === 'running' || round.status === 'paused') {
                startRound(round);
                // Replay existing buzzes
                if (round.buzzes) {
                    round.buzzes.forEach(b => markJudgeBuzzed(b.judge_id));
                }
                if (round.status === 'paused') {
                    if (timer) timer.pause();
                    if (scroller) scroller.pause();
                }
            } else if (round.status === 'defeat' || round.status === 'victory') {
                startRound(round);
                if (round.buzzes) {
                    round.buzzes.forEach(b => markJudgeBuzzed(b.judge_id));
                }
                if (timer) timer.stop();
                if (scroller) scroller.stop();
                showOutcome(round.status);
            }
        });

        client.on('round_started', (data) => {
            if (data.server_time) updateClockOffset(data.server_time);
            startRound(data);
        });

        client.on('text_advanced', (data) => {
            console.log('text_advanced event:', data);
            appendTextLine(data.line);
        });

        client.on('buzzed', (data) => {
            markJudgeBuzzed(data.judge_id);
            playSound('buzz');
        });

        client.on('round_ended', (data) => {
            if (timer) timer.stop();
            if (scroller) scroller.stop();
            showOutcome(data.outcome);
        });

        client.on('round_reset', () => {
            resetView();
        });

        client.on('shutdown', async (data) => {
            await customAlert(data.message || 'Audience view has been shutdown');
            window.location.href = 'index.html';
        });

        client.on('session_deleted', async (data) => {
            await customAlert(data.message || 'Session has been deleted');
            window.location.href = 'index.html';
        });

        client.on('judge_joined', (data) => {
            if (data.connected_judges) {
                renderJudgePanels(data.connected_judges);
            }
        });

        client.on('judge_left', (data) => {
            if (data.connected_judges) {
                renderJudgePanels(data.connected_judges);
            }
        });

        function renderJudgePanels(connectedJudges) {
            const container = document.getElementById('judgePanels');
            container.innerHTML = connectedJudges.map(judgeId => `
                <div class="judge-panel" data-judge="${judgeId}">
                    <span class="label">JUDGE ${judgeId}</span>
                    <span class="x">✕</span>
                </div>
            `).join('');
        }

        function startRound(roundData) {
            resetView();

            document.getElementById('storyTitle').textContent = roundData.title || 'Untitled';
            document.getElementById('storyText').textContent = ''; // Clear - will be populated line by line
        }

        function appendTextLine(line) {
            const textEl = document.getElementById('storyText');

            // Create span for new line with animation class
            const lineSpan = document.createElement('span');
            lineSpan.className = 'text-line';
            lineSpan.textContent = line;

            textEl.appendChild(lineSpan);

            // Add line break after (except for first line)
            if (textEl.children.length > 1) {
                const br = document.createElement('br');
                textEl.insertBefore(br, lineSpan);
            }

            // Auto-scroll to show new line after animation starts
            setTimeout(() => {
                const container = document.querySelector('.story-text-container');
                if (container) {
                    container.scrollTop = container.scrollHeight;
                }
            }, 100);
        }

        function markJudgeBuzzed(judgeId) {
            const panel = document.querySelector(`[data-judge="${judgeId}"]`);
            if (panel) {
                panel.classList.add('buzzed');
            }
        }

        function showOutcome(outcome) {
            stopTensionTicks();
            const outcomeEl = document.getElementById('outcome');
            outcomeEl.textContent = outcome === 'victory' ? 'SURVIVOR!' : 'BUZZED OUT';
            outcomeEl.className = `outcome ${outcome}`;
            outcomeEl.style.display = 'block';

            if (outcome === 'victory') {
                playSound('victory');
                // TODO: confetti/fireworks
            } else {
                playSound('defeat');
                document.body.classList.add('defeat-flash');
                setTimeout(() => document.body.classList.remove('defeat-flash'), 500);
            }
        }

        function resetView() {
            stopTensionTicks();
            tensionMode = false;

            // Stop timer and scroller
            if (timer) timer.stop();
            if (scroller) scroller.stop();

            document.getElementById('timer').classList.remove('tension');
            document.getElementById('outcome').style.display = 'none';
            document.getElementById('storyTitle').textContent = 'Waiting for story...';
            document.getElementById('storyText').textContent = '';
            document.getElementById('timer').textContent = '0:00.0';

            document.querySelectorAll('.judge-panel').forEach(panel => {
                panel.classList.remove('buzzed');
            });
        }

        // Simple tone generator for sound effects
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        function enableAudio() {
            audioContext.resume();
            document.getElementById('audioOverlay').style.display = 'none';
        }

        function playBuzzSound() {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = 200; // Low buzzer tone
            oscillator.type = 'sawtooth';

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
        }

        function playVictorySound() {
            const times = [0, 0.15, 0.3, 0.5];
            const freqs = [523, 659, 784, 1047]; // C, E, G, C (major chord)

            times.forEach((time, i) => {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                oscillator.frequency.value = freqs[i];
                oscillator.type = 'square';

                gainNode.gain.setValueAtTime(0.2, audioContext.currentTime + time);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + time + 0.3);

                oscillator.start(audioContext.currentTime + time);
                oscillator.stop(audioContext.currentTime + time + 0.3);
            });
        }

        function playDefeatSound() {
            const times = [0, 0.2, 0.4];
            const freqs = [440, 349, 262]; // Descending sad trombone

            times.forEach((time, i) => {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                oscillator.frequency.value = freqs[i];
                oscillator.type = 'sawtooth';

                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime + time);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + time + 0.4);

                oscillator.start(audioContext.currentTime + time);
                oscillator.stop(audioContext.currentTime + time + 0.4);
            });
        }

        function playTickSound() {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = 800;
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.05);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.05);
        }

        function playSound(type) {
            if (type === 'buzz') playBuzzSound();
            else if (type === 'victory') playVictorySound();
            else if (type === 'defeat') playDefeatSound();
            else if (type === 'tick') playTickSound();
        }

        // Add tick sound in tension mode
        let tickInterval = null;
        function startTensionTicks() {
            if (tickInterval) clearInterval(tickInterval);
            let tickRate = 1000; // Start at 1 second

            const tick = () => {
                playTickSound();
                tickRate = Math.max(100, tickRate * 0.9); // Accelerate
                tickInterval = setTimeout(tick, tickRate);
            };
            tick();
        }

        function stopTensionTicks() {
            if (tickInterval) {
                clearTimeout(tickInterval);
                tickInterval = null;
            }
        }
    </script>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <div class="modal-message" id="modalMessage"></div>
            <div class="modal-buttons">
                <button class="modal-btn" id="modalOk">OK</button>
                <button class="modal-btn cancel" id="modalCancel">Cancel</button>
            </div>
        </div>
    </div>

    <script src="modal.js"></script>
</body>
</html>
