<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controller - SPECULATIVE IDOL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="modal.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            padding: 2rem;
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: var(--text-heading);
            text-align: center;
            color: #ff0;
            margin-bottom: 1rem;
            line-height: 1.3;
        }

        h2 {
            font-family: 'Press Start 2P', cursive;
            font-size: var(--text-subheading);
            margin-top: 2rem;
            margin-bottom: 1rem;
            border-bottom: 2px solid #0f0;
            padding-bottom: 0.5rem;
            line-height: 1.4;
        }

        .session-info {
            padding: 1rem;
            border: 2px solid #0f0;
            margin-bottom: 3rem;
            text-align: center;
            font-family: 'Courier New', monospace;
            font-size: var(--text-body);
        }

        .session-info .code {
            display: inline;
            font-family: 'Press Start 2P', cursive;
            font-size: var(--text-body);
            color: #0f0;
            letter-spacing: 0.3rem;
        }

        .session-info .stats {
            display: inline;
            opacity: 0.7;
        }

        .session-management {
            margin-top: 3rem;
            border: 2px solid #f00;
            padding: 1rem;
        }

        .session-management h2 {
            color: #f00;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: var(--text-body);
            margin: 0;
            border: none;
            padding: 0;
        }

        .session-management .arrow {
            transition: transform 0.3s;
        }

        .session-management.collapsed .arrow {
            transform: rotate(-90deg);
        }

        .session-management.collapsed .management-content {
            display: none;
        }

        .management-content {
            margin-top: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .danger-btn {
            font-size: var(--text-body);
            padding: 0.75rem;
            background: #000;
            color: #f00;
            border: 2px solid #f00;
            cursor: pointer;
            font-family: 'Press Start 2P', cursive;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .danger-btn:hover {
            background: #f00;
            color: #000;
            box-shadow: 0 0 20px #f00;
        }

        .section {
            margin-bottom: 2rem;
            padding: 1rem;
            border: 1px solid #0f0;
        }

        .selected-story-display {
            text-align: center;
            padding: 2rem;
            margin-bottom: 3rem;
            border: 3px solid #ff0;
            background: rgba(255, 255, 0, 0.05);
        }

        .selected-story-display .label {
            font-family: 'Courier New', monospace;
            font-size: var(--text-caption);
            color: #0f0;
            opacity: 0.7;
            margin-bottom: 1rem;
        }

        .selected-story-display .title {
            font-family: 'Press Start 2P', cursive;
            font-size: var(--text-display);
            color: #ff0;
            text-shadow: 0 0 20px #ff0;
            line-height: 1.2;
            min-height: 4rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .selected-story-display .title.empty {
            opacity: 0.4;
            font-size: var(--text-heading);
        }

        .story-management {
            margin-bottom: 3rem;
            border: 1px solid #0f0;
            padding: 1rem;
        }

        .story-management h2 {
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 0;
            border: none;
            padding: 0;
        }

        .story-management .arrow {
            transition: transform 0.3s;
        }

        .story-management.collapsed .arrow {
            transform: rotate(-90deg);
        }

        .story-management.collapsed .management-content {
            display: none;
        }

        .management-content {
            margin-top: 1rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .management-section {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        @media (max-width: 900px) {
            .management-content {
                grid-template-columns: 1fr;
            }
        }

        input, textarea, button, select {
            background: #000;
            color: #0f0;
            border: 2px solid #0f0;
            padding: 0.5rem;
            font-family: 'Courier New', monospace;
            font-size: var(--text-body);
            margin: 0.25rem;
        }

        button {
            cursor: pointer;
            font-family: 'Press Start 2P', cursive;
            font-size: var(--text-body);
            padding: 0.75rem 1.5rem;
            transition: all 0.2s;
        }

        button:hover {
            background: #0f0;
            color: #000;
        }

        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        textarea {
            width: 100%;
            min-height: 100px;
            resize: vertical;
        }

        .story-queue {
            list-style: none;
            min-height: 100px;
        }

        .story-item {
            border: 1px solid #0f0;
            padding: 0.5rem;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .story-item:hover {
            background: rgba(0, 255, 0, 0.1);
        }

        .story-item.current {
            border-color: #ff0;
            color: #ff0;
        }

        .story-info {
            flex: 1;
        }

        .story-actions {
            display: flex;
            gap: 0.5rem;
        }

        /* Empty state styling */
        .empty-state {
            text-align: center;
            padding: 2rem;
            opacity: 0.7;
            line-height: 1.8;
        }

        .empty-state .cta {
            color: #ff0;
            font-weight: bold;
            margin-top: 0.5rem;
            display: block;
        }

        .controls {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .history-list {
            list-style: none;
        }

        .history-item {
            border: 1px solid #0f0;
            padding: 0.5rem;
            margin-bottom: 0.5rem;
            font-size: var(--text-body);
        }

        .history-item.victory {
            border-color: #0f0;
        }

        .history-item.defeat {
            border-color: #f00;
            color: #f00;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
        }

        .management-section h3 {
            font-size: var(--text-subheading);
            margin-bottom: 1rem;
            color: #0f0;
        }

        label {
            display: block;
            margin-bottom: 0.25rem;
            font-size: var(--text-body);
        }

        .import-export {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .import-export textarea {
            min-height: 200px;
            font-size: var(--text-caption);
        }
    </style>
</head>
<body>
    <h1>CONTROLLER</h1>

    <!-- Compact session info -->
    <div class="session-info">
        CODE: <span class="code" id="sessionCode">----</span>
        <span class="stats">| <span id="storyCount">0</span> stories | <span id="judgeCount">0</span> judges | <span id="audienceCount">0</span> audience</span>
    </div>

    <!-- PROMINENT: Currently selected story -->
    <div class="selected-story-display">
        <div class="label">NOW PERFORMING</div>
        <div class="title empty" id="selectedStoryTitle">No story selected - choose from queue below</div>
    </div>

    <!-- PRIMARY: Round controls -->
    <div class="section">
        <h2>Round Controls</h2>
        <div id="currentStatus" style="margin-bottom: 1rem;">Status: Waiting</div>

        <div class="controls">
            <button onclick="startRound()" id="startBtn">Start Round</button>
            <button onclick="pauseRound()" id="pauseBtn" disabled>Pause</button>
            <button onclick="resumeRound()" id="resumeBtn" disabled>Resume</button>
            <button onclick="changeSpeed(1)" id="speed1Btn">1x</button>
            <button onclick="changeSpeed(2)" id="speed2Btn">2x</button>
            <button onclick="changeSpeed(3)" id="speed3Btn">3x</button>
            <button onclick="resetRound()" id="resetBtn">Reset</button>
        </div>
    </div>

    <!-- SECONDARY: Story queue (what's next) -->
    <div class="section">
        <h2>Story Queue</h2>
        <ul class="story-queue" id="storyQueue"></ul>
    </div>

    <!-- TERTIARY: Story management (collapsed by default) -->
    <div class="story-management collapsed" id="storyManagement">
        <h2 onclick="toggleStoryManagement()">
            <span class="arrow" id="managementArrow">▼</span>
            Story Management
        </h2>
        <div class="management-content">
            <div class="management-section">
                <h3>Add Story</h3>
                <div class="form-group">
                    <label>Title:</label>
                    <input type="text" id="storyTitle" placeholder="Story title">
                </div>
                <div class="form-group">
                    <label>Text:</label>
                    <textarea id="storyText" placeholder="Story text..."></textarea>
                </div>
                <button onclick="addStory()">Add Story</button>
            </div>

            <div class="management-section">
                <h3>Import / Export</h3>
                <textarea id="importExportJson" placeholder="Session JSON..." style="min-height: 150px;"></textarea>
                <button onclick="exportSession()">Export to JSON</button>
                <button onclick="importSession()">Import from JSON</button>
            </div>
        </div>
    </div>

    <!-- TERTIARY: History -->
    <div class="section">
        <h2>History</h2>
        <ul class="history-list" id="historyList"></ul>
    </div>

    <!-- TERTIARY: Session management (collapsed, danger zone) -->
    <div class="session-management collapsed" id="sessionManagementSection">
        <h2 onclick="toggleSessionManagement()">
            <span class="arrow" id="sessionMgmtArrow">▼</span>
            Session Management (Danger Zone)
        </h2>
        <div class="management-content">
            <button class="danger-btn" onclick="ejectJudges()">Eject All Judges</button>
            <button class="danger-btn" onclick="shutdownAudience()">Shutdown All Audience</button>
            <button class="danger-btn" onclick="deleteSession()">Delete Session</button>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        const params = getUrlParams();
        const client = new SpecIdolClient();
        let sessionState = null;
        let currentSpeed = 1;

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        client.connect();

        client.onConnect = () => {
            if (params.code) {
                client.joinSession(params.code, 'controller');
            } else {
                client.createSession();
            }
        };

        client.on('session_created', (data) => {
            document.getElementById('sessionCode').textContent = data.code;
            // Update URL to include code
            const newUrl = new URL(window.location);
            newUrl.searchParams.set('code', data.code);
            window.history.replaceState({}, '', newUrl);
            // Join as controller
            client.joinSession(data.code, 'controller');
        });

        client.on('session_state', (data) => {
            sessionState = data;
            updateUI();
            updateSessionCounts(data);
        });

        client.on('judge_joined', (data) => {
            if (sessionState) {
                updateSessionCounts({connected_judges: data.connected_judges});
            }
        });

        client.on('judge_left', (data) => {
            if (sessionState) {
                updateSessionCounts({connected_judges: data.connected_judges});
            }
        });

        client.on('audience_joined', (data) => {
            if (sessionState) {
                updateSessionCounts({audience_count: data.audience_count});
            }
        });

        client.on('audience_left', (data) => {
            if (sessionState) {
                updateSessionCounts({audience_count: data.audience_count});
            }
        });

        client.on('story_added', (data) => {
            // Controller already updates local state in addStory().
            // This handler covers stories added by import or future multi-controller.
            if (sessionState && data.index >= sessionState.stories.length) {
                sessionState.stories.push({title: data.title, text: ''});
                renderStoryQueue();
            }
            updateSessionCounts({stories: sessionState.stories});
        });

        client.on('story_removed', (data) => {
            if (sessionState && data.index < sessionState.stories.length) {
                sessionState.stories.splice(data.index, 1);
                renderStoryQueue();
            }
            updateSessionCounts({stories: sessionState.stories});
        });

        client.on('round_started', (data) => {
            updateStatus('running');
            updateSelectedStoryDisplay();
        });

        client.on('paused', (data) => {
            updateStatus('paused');
        });

        client.on('resumed', (data) => {
            updateStatus('running');
        });

        client.on('round_ended', (data) => {
            updateStatus('ended');
            if (sessionState) {
                sessionState.history.push({
                    title: sessionState.current_round.title,
                    ...data
                });
                renderHistory();
            }
        });

        client.on('round_reset', () => {
            updateStatus('waiting');
        });

        client.on('session_imported', (data) => {
            alert(`Imported ${data.story_count} stories`);
            // Trigger refresh by requesting session state
            if (params.code) {
                client.joinSession(params.code, 'controller');
            }
        });

        function updateUI() {
            if (!sessionState) return;

            document.getElementById('sessionCode').textContent = sessionState.code || '----';
            renderStoryQueue();
            renderHistory();
            updateStatus(sessionState.current_round.status);
            updateSelectedStoryDisplay();
        }

        function renderStoryQueue() {
            const queue = document.getElementById('storyQueue');
            if (!sessionState || !sessionState.stories || sessionState.stories.length === 0) {
                queue.innerHTML = `
                    <li class="empty-state">
                        No stories yet.
                        <span class="cta">Add your first story to get started ↓</span>
                    </li>
                `;

                // Auto-expand Story Management if queue empty (onboarding)
                const storyMgmt = document.getElementById('storyManagement');
                if (storyMgmt && storyMgmt.classList.contains('collapsed')) {
                    storyMgmt.classList.remove('collapsed');
                }
                return;
            }

            queue.innerHTML = sessionState.stories.map((story, i) => {
                const isCurrent = i === sessionState.current_round.story_index;
                return `
                    <li class="story-item ${isCurrent ? 'current' : ''}" onclick="selectStory(${i})">
                        <div class="story-info">
                            <strong>${escapeHtml(story.title)}</strong><br>
                            <span style="opacity: 0.7; font-size: var(--text-caption);">
                                ${escapeHtml(story.text.substring(0, 80))}...
                            </span>
                        </div>
                        <div class="story-actions">
                            <button onclick="event.stopPropagation(); removeStory(${i})">Remove</button>
                        </div>
                    </li>
                `;
            }).join('');
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            if (!sessionState || sessionState.history.length === 0) {
                list.innerHTML = '<li style="opacity: 0.7; text-align: center; padding: 1rem;">No rounds completed yet. Start a round to build history.</li>';
                return;
            }

            list.innerHTML = sessionState.history.map(entry => {
                const buzzInfo = entry.buzzes.map(b => `J${b.judge_id}:${b.time}s`).join(', ');
                return `
                    <li class="history-item ${entry.outcome}">
                        <strong>${escapeHtml(entry.title)}</strong> - ${entry.outcome.toUpperCase()}<br>
                        <span style="font-size: var(--text-caption);">
                            Duration: ${entry.duration}s | Buzzes: ${buzzInfo || 'none'}
                        </span>
                    </li>
                `;
            }).join('');
        }

        function updateStatus(status) {
            document.getElementById('currentStatus').textContent = `Status: ${status}`;

            // Enable/disable buttons based on status
            const startBtn = document.getElementById('startBtn');
            const pauseBtn = document.getElementById('pauseBtn');
            const resumeBtn = document.getElementById('resumeBtn');

            startBtn.disabled = (status === 'running' || status === 'paused');
            pauseBtn.disabled = (status !== 'running');
            resumeBtn.disabled = (status !== 'paused');
        }

        function addStory() {
            const title = document.getElementById('storyTitle').value.trim();
            const text = document.getElementById('storyText').value.trim();

            if (!title || !text) {
                alert('Enter both title and text');
                return;
            }

            const wasEmpty = !sessionState || sessionState.stories.length === 0;

            client.addStory(title, text);
            if (sessionState) {
                sessionState.stories.push({title, text});
                renderStoryQueue();

                // Success: first story added - collapse Story Management to shift to "live mode"
                if (wasEmpty) {
                    const storyMgmt = document.getElementById('storyManagement');
                    storyMgmt.classList.add('collapsed');
                }
            }
            document.getElementById('storyTitle').value = '';
            document.getElementById('storyText').value = '';
        }

        function selectStory(index) {
            if (!sessionState) return;
            sessionState.current_round.story_index = index;
            renderStoryQueue();
            updateSelectedStoryDisplay();
        }

        function updateSelectedStoryDisplay() {
            const titleEl = document.getElementById('selectedStoryTitle');
            if (!sessionState) return;

            const index = sessionState.current_round.story_index;
            if (index !== null && sessionState.stories[index]) {
                titleEl.textContent = sessionState.stories[index].title;
                titleEl.classList.remove('empty');
            } else {
                titleEl.textContent = 'No story selected - choose from queue below';
                titleEl.classList.add('empty');
            }
        }

        function toggleStoryManagement() {
            const section = document.getElementById('storyManagement');
            const arrow = document.getElementById('managementArrow');
            section.classList.toggle('collapsed');
        }

        function toggleSessionManagement() {
            const section = document.getElementById('sessionManagementSection');
            const arrow = document.getElementById('sessionMgmtArrow');
            section.classList.toggle('collapsed');
        }

        function removeStory(index) {
            if (confirm('Remove this story?')) {
                client.removeStory(index);
            }
        }

        function startRound() {
            if (!sessionState || sessionState.current_round.story_index === null) {
                alert('Select a story first');
                return;
            }
            client.startRound(sessionState.current_round.story_index);
        }

        function pauseRound() {
            client.pause();
        }

        function resumeRound() {
            client.resume();
        }

        function changeSpeed(speed) {
            currentSpeed = speed;
            client.changeSpeed(speed);

            // Update button states
            document.getElementById('speed1Btn').style.background = speed === 1 ? '#0f0' : '#000';
            document.getElementById('speed2Btn').style.background = speed === 2 ? '#0f0' : '#000';
            document.getElementById('speed3Btn').style.background = speed === 3 ? '#0f0' : '#000';
            document.getElementById('speed1Btn').style.color = speed === 1 ? '#000' : '#0f0';
            document.getElementById('speed2Btn').style.color = speed === 2 ? '#000' : '#0f0';
            document.getElementById('speed3Btn').style.color = speed === 3 ? '#000' : '#0f0';
        }

        function resetRound() {
            if (confirm('Reset the current round?')) {
                client.resetRound();
            }
        }

        function exportSession() {
            if (!sessionState) return;

            const exportData = {
                stories: sessionState.stories,
                config: sessionState.config
            };

            document.getElementById('importExportJson').value = JSON.stringify(exportData, null, 2);
        }

        function importSession() {
            const json = document.getElementById('importExportJson').value.trim();
            if (!json) {
                alert('Paste JSON first');
                return;
            }

            try {
                const data = JSON.parse(json);
                client.importSession(data.stories || [], data.config || {});
            } catch (e) {
                alert('Invalid JSON: ' + e.message);
            }
        }

        function updateSessionCounts(data) {
            if (data.stories !== undefined) {
                document.getElementById('storyCount').textContent = data.stories.length;
            }
            if (data.connected_judges !== undefined) {
                document.getElementById('judgeCount').textContent = data.connected_judges.length;
            }
            if (data.audience_count !== undefined) {
                document.getElementById('audienceCount').textContent = data.audience_count;
            }
        }

        async function ejectJudges() {
            if (await customConfirm('Eject all judges? They will be disconnected with a message.')) {
                client.send('eject_judges');
            }
        }

        async function shutdownAudience() {
            if (await customConfirm('Shutdown all audience screens? They will be disconnected.')) {
                client.send('shutdown_audience');
            }
        }

        async function deleteSession() {
            if (await customConfirm('DELETE SESSION? This will eject all judges, shutdown all audience screens, and delete the session. This cannot be undone.')) {
                client.send('delete_session');
                // Redirect back to home after deletion
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            }
        }
    </script>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <div class="modal-message" id="modalMessage"></div>
            <div class="modal-buttons">
                <button class="modal-btn" id="modalOk">OK</button>
                <button class="modal-btn cancel" id="modalCancel">Cancel</button>
            </div>
        </div>
    </div>

    <script src="modal.js"></script>
</body>
</html>
