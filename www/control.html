<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controller - SPECULATIVE IDOL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"></noscript>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="modal.css">
    <style>
        h1 {
            font-size: var(--text-heading);
            color: #ff0;
            margin-bottom: 1rem;
            line-height: 1.3;
        }

        h2 {
            font-size: var(--text-subheading);
            margin-top: 2rem;
            margin-bottom: 1rem;
            border-bottom: 2px solid #0f0;
            padding-bottom: 0.5rem;
            line-height: 1.4;
        }

        .session-info {
            padding: 1rem;
            border: 2px solid #0f0;
            margin-bottom: 3rem;
            text-align: center;
            font-family: 'Courier New', monospace;
            font-size: var(--text-body);
        }

        .session-info .code {
            display: inline;
            font-family: 'Press Start 2P', cursive;
            font-size: var(--text-body);
            color: #0f0;
            letter-spacing: 0.3rem;
        }

        .session-info .stats {
            display: inline;
            opacity: 0.7;
        }

        .session-management {
            margin-top: 3rem;
            border: 2px solid #f00;
            padding: 1rem;
        }

        .session-management h2 {
            color: #f00;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: var(--text-body);
            margin: 0;
            border: none;
            padding: 0;
        }

        .session-management .arrow {
            transition: transform 0.3s;
        }

        .session-management.collapsed .arrow {
            transform: rotate(-90deg);
        }

        .session-management.collapsed .management-content {
            display: none;
        }

        .management-content {
            margin-top: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .danger-btn {
            font-size: var(--text-body);
            padding: 0.75rem;
            background: #000;
            color: #f00;
            border: 2px solid #f00;
            cursor: pointer;
            font-family: 'Press Start 2P', cursive;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .danger-btn:hover {
            background: #f00;
            color: #000;
            box-shadow: 0 0 20px #f00;
        }

        .section {
            margin-bottom: 2rem;
            padding: 1rem;
            border: 1px solid #0f0;
        }

        .selected-story-display {
            text-align: center;
            padding: 2rem;
            margin-bottom: 3rem;
            border: 3px solid #ff0;
            background: rgba(255, 255, 0, 0.05);
        }

        .selected-story-display .label {
            font-family: 'Courier New', monospace;
            font-size: var(--text-caption);
            color: #0f0;
            opacity: 0.7;
            margin-bottom: 1rem;
        }

        .selected-story-display .title {
            font-family: 'Press Start 2P', cursive;
            font-size: var(--text-display);
            color: #ff0;
            text-shadow: 0 0 20px #ff0;
            line-height: 1.2;
            min-height: 4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .selected-story-display .title.empty {
            opacity: 0.4;
            font-size: var(--text-heading);
        }

        .round-controls-section {
            border-top: 2px solid #ff0;
            padding-top: 1.5rem;
            margin-top: 1.5rem;
        }

        .status-text {
            font-family: 'Courier New', monospace;
            font-size: var(--text-body);
            color: #0f0;
            margin-bottom: 1rem;
        }

        .story-management {
            margin-bottom: 3rem;
            border: 1px solid #0f0;
            padding: 1rem;
        }

        .story-management h2 {
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 0;
            border: none;
            padding: 0;
        }

        .story-management .arrow {
            transition: transform 0.3s;
        }

        .story-management.collapsed .arrow {
            transform: rotate(-90deg);
        }

        .story-management.collapsed .management-content {
            display: none;
        }

        .management-content {
            margin-top: 1rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .management-section {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        @media (max-width: 900px) {
            .management-content {
                grid-template-columns: 1fr;
            }
        }

        input, textarea, button, select {
            background: #000;
            color: #0f0;
            border: 2px solid #0f0;
            padding: 0.5rem;
            font-family: 'Courier New', monospace;
            font-size: var(--text-body);
            margin: 0.25rem;
        }

        button {
            cursor: pointer;
            font-family: 'Press Start 2P', cursive;
            font-size: var(--text-body);
            padding: 0.75rem 1.5rem;
            transition: all 0.2s;
        }

        button:hover {
            background: #0f0;
            color: #000;
        }

        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        textarea {
            width: 100%;
            min-height: 100px;
            resize: vertical;
        }

        .story-queue {
            list-style: none;
            min-height: 100px;
        }

        .story-item {
            border: 1px solid #0f0;
            padding: 0.5rem;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .story-item:hover {
            background: rgba(0, 255, 0, 0.1);
        }

        .story-item.current {
            border-color: #ff0;
            color: #ff0;
        }

        .story-item.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .story-item.disabled:hover {
            background: transparent;
        }

        .story-info {
            flex: 1;
            min-width: 0; /* Allow shrinking */
            overflow: hidden;
        }

        .story-info strong {
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .story-actions {
            display: flex;
            gap: 0.5rem;
        }

        .story-actions button {
            background: #000;
            color: #f00;
            border-color: #f00;
            font-size: var(--text-caption);
            padding: 0.5rem 1rem;
        }

        .story-actions button:hover {
            background: #f00;
            color: #000;
            box-shadow: 0 0 20px #f00;
        }

        /* Empty state styling */
        .empty-state {
            text-align: center;
            padding: 2rem;
            opacity: 0.7;
            line-height: 1.8;
        }

        .empty-state .cta {
            color: #ff0;
            font-weight: bold;
            margin-top: 0.5rem;
            display: block;
        }

        .controls {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .history-list {
            list-style: none;
        }

        .history-item {
            border: 1px solid #0f0;
            padding: 0.5rem;
            margin-bottom: 0.5rem;
            font-size: var(--text-body);
        }

        .history-item.victory {
            border-color: #0f0;
        }

        .history-item.defeat {
            border-color: #f00;
            color: #f00;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
        }

        .management-section h3 {
            font-size: var(--text-subheading);
            margin-bottom: 1rem;
            color: #0f0;
        }

        #cancelEditBtn {
            background: #000;
            color: #f00;
            border-color: #f00;
        }

        #cancelEditBtn:hover {
            background: #f00;
            color: #000;
            box-shadow: 0 0 20px #f00;
        }

        label {
            display: block;
            margin-bottom: 0.25rem;
            font-size: var(--text-body);
        }

        .import-export {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .import-export textarea {
            min-height: 200px;
            font-size: var(--text-caption);
        }
    </style>
</head>
<body class="page-scrollable">
    <header class="page-header">
        <h1>CONTROLLER</h1>

        <!-- Compact session info -->
        <div class="session-info">
            CODE: <span class="code" id="sessionCode">----</span>
            <span class="stats">| <span id="storyCount">0</span> stories | <span id="judgeCount">0</span> judges | <span id="audienceCount">0</span> audience</span>
            <button onclick="openAudienceView()" style="font-size: var(--text-caption); padding: 0.5rem 1rem; margin-left: 1rem; vertical-align: middle;">Open Audience View</button>
        </div>
    </header>

    <main class="page-content">
    <!-- PRIMARY: Selected story + Round controls (unified) -->
    <div class="selected-story-display">
        <div class="label">NOW PERFORMING</div>
        <div class="title empty" id="selectedStoryTitle">No story selected - choose from queue below</div>

        <div class="round-controls-section">
            <div id="currentStatus" class="status-text">Status: Waiting</div>

            <div class="controls">
                <button onclick="startRound()" id="startBtn">Start Round</button>
                <button onclick="advanceText()" id="advanceBtn" disabled style="background: #ff0; color: #000; border-color: #ff0;">Advance Text</button>
                <button onclick="resetRound()" id="resetBtn">Reset</button>
            </div>
            <div id="textProgress" style="font-family: 'Courier New', monospace; font-size: var(--text-caption); margin-top: 1rem; opacity: 0.7; text-align: center;"></div>
        </div>
    </div>

    <!-- SECONDARY: Story queue (what's next) -->
    <div class="section">
        <h2>Story Queue</h2>
        <ul class="story-queue" id="storyQueue"></ul>
    </div>

    <!-- TERTIARY: Story management (collapsed by default) -->
    <div class="story-management collapsed" id="storyManagement">
        <h2 onclick="toggleStoryManagement()">
            <span class="arrow" id="managementArrow">▼</span>
            Story Management
        </h2>
        <div class="management-content">
            <div class="management-section">
                <h3 id="storyFormTitle">Add Story</h3>
                <div class="form-group">
                    <label>Title:</label>
                    <input type="text" id="storyTitle" placeholder="Story title">
                </div>
                <div class="form-group">
                    <label>Text:</label>
                    <textarea id="storyText" placeholder="Story text..."></textarea>
                </div>
                <button onclick="saveStory()" id="saveStoryBtn">Add Story</button>
                <button onclick="cancelEdit()" id="cancelEditBtn" style="display: none; margin-left: 0.5rem; background: #800; color: #f00; border-color: #f00;">Cancel</button>
            </div>

            <div class="management-section">
                <h3>Import / Export</h3>
                <textarea id="importExportJson" placeholder="Session JSON..." style="min-height: 150px;"></textarea>
                <button onclick="exportSession()">Export to JSON</button>
                <button onclick="importSession()">Import from JSON</button>
            </div>
        </div>
    </div>

    <!-- TERTIARY: History -->
    <div class="section">
        <h2>History
            <button onclick="copyHistory()" style="font-size: var(--text-caption); padding: 0.5rem 1rem; margin-left: 1rem; vertical-align: middle;">Copy JSON</button>
        </h2>
        <ul class="history-list" id="historyList"></ul>
    </div>

    </main>

    <footer class="page-footer">
        <!-- Session management (collapsed, danger zone) -->
        <div class="session-management collapsed" id="sessionManagementSection">
            <h2 onclick="toggleSessionManagement()">
                <span class="arrow" id="sessionMgmtArrow">▼</span>
                Session Management (Danger Zone)
            </h2>
            <div class="management-content">
                <button class="danger-btn" onclick="ejectJudges()">Eject All Judges</button>
                <button class="danger-btn" onclick="shutdownAudience()">Shutdown All Audience</button>
                <button class="danger-btn" onclick="deleteSession()">Delete Session</button>
            </div>
        </div>
    </footer>

    <script src="app.js"></script>
    <script>
        const params = getUrlParams();
        const client = new SpecIdolClient();
        let sessionState = null;
        let editingStoryIndex = null;

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        client.connect();

        client.onConnect = () => {
            if (params.code) {
                client.joinSession(params.code, 'controller');
            } else {
                client.createSession();
            }
        };

        client.on('session_created', (data) => {
            document.getElementById('sessionCode').textContent = data.code;
            // Update URL to include code
            const newUrl = new URL(window.location);
            newUrl.searchParams.set('code', data.code);
            window.history.replaceState({}, '', newUrl);
            // Join as controller
            client.joinSession(data.code, 'controller');
        });

        client.on('session_state', (data) => {
            sessionState = data;
            updateUI();
            updateSessionCounts(data);
        });

        client.on('judge_joined', (data) => {
            if (sessionState) {
                updateSessionCounts({connected_judges: data.connected_judges});
            }
        });

        client.on('judge_left', (data) => {
            if (sessionState) {
                updateSessionCounts({connected_judges: data.connected_judges});
            }
        });

        client.on('audience_joined', (data) => {
            if (sessionState) {
                updateSessionCounts({audience_count: data.audience_count});
            }
        });

        client.on('audience_left', (data) => {
            if (sessionState) {
                updateSessionCounts({audience_count: data.audience_count});
            }
        });

        client.on('story_added', (data) => {
            // Controller already updates local state in addStory().
            // This handler covers stories added by import or future multi-controller.
            if (sessionState && data.index >= sessionState.stories.length) {
                sessionState.stories.push({title: data.title, text: ''});
                renderStoryQueue();
            }
            updateSessionCounts({stories: sessionState.stories});
        });

        client.on('story_removed', (data) => {
            if (sessionState && data.index < sessionState.stories.length) {
                sessionState.stories.splice(data.index, 1);
                renderStoryQueue();
            }
            updateSessionCounts({stories: sessionState.stories});
        });

        client.on('round_started', (data) => {
            updateStatus('running');
            if (sessionState) {
                sessionState.current_round.status = 'running';
                sessionState.current_round.text_line_count = data.text_line_count || 0;
                renderStoryQueue(); // Re-render to show disabled state
            }
            updateSelectedStoryDisplay();
            updateTextProgress(0, data.text_line_count || 0); // Reset progress
        });

        client.on('text_advanced', (data) => {
            updateTextProgress(data.position + 1, data.total);
        });

        client.on('paused', (data) => {
            updateStatus('paused');
            if (sessionState) {
                sessionState.current_round.status = 'paused';
                renderStoryQueue(); // Re-render to show disabled state
            }
        });

        client.on('resumed', (data) => {
            updateStatus('running');
            if (sessionState) {
                sessionState.current_round.status = 'running';
                renderStoryQueue(); // Re-render to show disabled state
            }
        });

        client.on('round_ended', (data) => {
            updateStatus('ended');
            if (sessionState) {
                sessionState.current_round.status = 'ended';
                sessionState.history.push({
                    title: sessionState.current_round.title,
                    ...data
                });
                renderHistory();
                renderStoryQueue(); // Re-render to remove disabled state
            }
        });

        client.on('round_reset', () => {
            updateStatus('waiting');
            if (sessionState) {
                sessionState.current_round.status = 'waiting';
                renderStoryQueue(); // Re-render to remove disabled state
            }
        });

        client.on('session_imported', async (data) => {
            await customAlert(`Imported ${data.story_count} stories`);
            // Trigger refresh by requesting session state
            if (params.code) {
                client.joinSession(params.code, 'controller');
            }
        });

        function updateUI() {
            if (!sessionState) return;

            document.getElementById('sessionCode').textContent = sessionState.code || '----';
            renderStoryQueue();
            renderHistory();
            updateStatus(sessionState.current_round.status);
            updateSelectedStoryDisplay();
        }

        function renderStoryQueue() {
            const queue = document.getElementById('storyQueue');
            if (!sessionState || !sessionState.stories || sessionState.stories.length === 0) {
                queue.innerHTML = `
                    <li class="empty-state">
                        No stories yet.
                        <span class="cta">Add your first story to get started ↓</span>
                    </li>
                `;

                // Auto-expand Story Management if queue empty (onboarding)
                const storyMgmt = document.getElementById('storyManagement');
                if (storyMgmt && storyMgmt.classList.contains('collapsed')) {
                    storyMgmt.classList.remove('collapsed');
                }
                return;
            }

            const status = sessionState.current_round.status;
            const roundActive = status === 'running' || status === 'paused';

            queue.innerHTML = sessionState.stories.map((story, i) => {
                const isCurrent = i === sessionState.current_round.story_index;
                const disabledClass = roundActive ? 'disabled' : '';
                return `
                    <li class="story-item ${isCurrent ? 'current' : ''} ${disabledClass}" onclick="selectStory(${i})">
                        <div class="story-info">
                            <strong>${escapeHtml(story.title)}</strong><br>
                            <span style="opacity: 0.7; font-size: var(--text-caption);">
                                ${escapeHtml(story.text.substring(0, 80))}...
                            </span>
                        </div>
                        <div class="story-actions">
                            <button onclick="event.stopPropagation(); removeStory(${i})">Remove</button>
                        </div>
                    </li>
                `;
            }).join('');
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            if (!sessionState || sessionState.history.length === 0) {
                list.innerHTML = '<li style="opacity: 0.7; text-align: center; padding: 1rem;">No rounds completed yet. Start a round to build history.</li>';
                return;
            }

            list.innerHTML = sessionState.history.map(entry => {
                const buzzInfo = entry.buzzes.map(b => `J${b.judge_id}:${b.time}s`).join(', ');
                return `
                    <li class="history-item ${entry.outcome}">
                        <strong>${escapeHtml(entry.title)}</strong> - ${entry.outcome.toUpperCase()}<br>
                        <span style="font-size: var(--text-caption);">
                            Duration: ${entry.duration}s | Buzzes: ${buzzInfo || 'none'}
                        </span>
                    </li>
                `;
            }).join('');
        }

        function updateStatus(status) {
            document.getElementById('currentStatus').textContent = `Status: ${status}`;

            // Enable/disable buttons based on status
            const startBtn = document.getElementById('startBtn');
            const advanceBtn = document.getElementById('advanceBtn');

            startBtn.disabled = (status === 'running');
            advanceBtn.disabled = (status !== 'running');
        }

        function updateTextProgress(position, total) {
            const progressEl = document.getElementById('textProgress');
            if (!progressEl) return;

            if (total === null) {
                progressEl.textContent = 'Ready to advance text';
            } else {
                progressEl.textContent = `Line ${position}/${total}`;
            }
        }

        async function addStory() {
            const title = document.getElementById('storyTitle').value.trim();
            const text = document.getElementById('storyText').value.trim();

            if (!title || !text) {
                await customAlert('Enter both title and text');
                return;
            }

            // Validate reasonable lengths
            if (title.length > 200) {
                await customAlert('Title too long (max 200 characters)');
                return;
            }
            if (text.length > 10000) {
                await customAlert('Text too long (max 10,000 characters)');
                return;
            }

            const wasEmpty = !sessionState || sessionState.stories.length === 0;

            client.addStory(title, text);
            if (sessionState) {
                sessionState.stories.push({title, text});
                renderStoryQueue();

                // Success: first story added - collapse Story Management to shift to "live mode"
                if (wasEmpty) {
                    const storyMgmt = document.getElementById('storyManagement');
                    storyMgmt.classList.add('collapsed');
                }
            }
            document.getElementById('storyTitle').value = '';
            document.getElementById('storyText').value = '';
            editingStoryIndex = null;
            updateFormUI();
        }

        function loadStoryForEditing(index) {
            if (!sessionState || !sessionState.stories[index]) return;

            const story = sessionState.stories[index];
            document.getElementById('storyTitle').value = story.title;
            document.getElementById('storyText').value = story.text;
            editingStoryIndex = index;
            updateFormUI();

            // Auto-expand Story Management for editing
            const storyMgmt = document.getElementById('storyManagement');
            storyMgmt.classList.remove('collapsed');
        }

        function updateFormUI() {
            const formTitle = document.getElementById('storyFormTitle');
            const saveBtn = document.getElementById('saveStoryBtn');
            const cancelBtn = document.getElementById('cancelEditBtn');

            if (editingStoryIndex !== null) {
                formTitle.textContent = 'Edit Story';
                saveBtn.textContent = 'Update Story';
                cancelBtn.style.display = 'inline-block';
            } else {
                formTitle.textContent = 'Add Story';
                saveBtn.textContent = 'Add Story';
                cancelBtn.style.display = 'none';
            }
        }

        async function saveStory() {
            if (editingStoryIndex !== null) {
                await updateStory();
            } else {
                await addStory();
            }
        }

        async function updateStory() {
            const title = document.getElementById('storyTitle').value.trim();
            const text = document.getElementById('storyText').value.trim();

            if (!title || !text) {
                await customAlert('Enter both title and text');
                return;
            }

            if (!sessionState || editingStoryIndex === null) return;

            // Update story in place - no need to remove/re-add
            sessionState.stories[editingStoryIndex] = {title, text};
            renderStoryQueue();

            document.getElementById('storyTitle').value = '';
            document.getElementById('storyText').value = '';
            editingStoryIndex = null;
            updateFormUI();
        }

        function cancelEdit() {
            document.getElementById('storyTitle').value = '';
            document.getElementById('storyText').value = '';
            editingStoryIndex = null;
            updateFormUI();
        }

        async function selectStory(index) {
            if (!sessionState) return;

            // Block story selection during active round
            const status = sessionState.current_round.status;
            if (status === 'running' || status === 'paused') {
                await customAlert('Cannot change story during active round. Reset or wait for round to end.');
                return;
            }

            sessionState.current_round.story_index = index;
            renderStoryQueue();
            updateSelectedStoryDisplay();

            // Load story into form for editing (when round not active)
            loadStoryForEditing(index);
        }

        function updateSelectedStoryDisplay() {
            const titleEl = document.getElementById('selectedStoryTitle');
            if (!sessionState) return;

            const index = sessionState.current_round.story_index;
            if (index !== null && sessionState.stories[index]) {
                titleEl.textContent = sessionState.stories[index].title;
                titleEl.classList.remove('empty');
            } else {
                titleEl.textContent = 'No story selected - choose from queue below';
                titleEl.classList.add('empty');
            }
        }

        function toggleStoryManagement() {
            const section = document.getElementById('storyManagement');
            const arrow = document.getElementById('managementArrow');
            section.classList.toggle('collapsed');
        }

        function toggleSessionManagement() {
            const section = document.getElementById('sessionManagementSection');
            const arrow = document.getElementById('sessionMgmtArrow');
            section.classList.toggle('collapsed');
        }

        async function removeStory(index) {
            if (await customConfirm('Remove this story?')) {
                client.removeStory(index);
            }
        }

        async function startRound() {
            const btn = document.getElementById('startBtn');
            if (btn.disabled) return;

            if (!sessionState || sessionState.current_round.story_index === null) {
                await customAlert('Select a story first');
                return;
            }

            btn.disabled = true;
            client.startRound(sessionState.current_round.story_index);
            // Will be re-enabled by round_started event via updateStatus()
        }

        async function resetRound() {
            if (await customConfirm('Reset the current round?')) {
                client.resetRound();
            }
        }

        function advanceText() {
            const btn = document.getElementById('advanceBtn');
            if (btn.disabled) return;

            if (!sessionState || sessionState.current_round.status !== 'running') {
                return;
            }

            // Prevent double-click
            btn.disabled = true;
            client.advanceText();

            // Re-enable after short delay
            setTimeout(() => {
                if (sessionState && sessionState.current_round.status === 'running') {
                    btn.disabled = false;
                }
            }, 300);
        }

        function openAudienceView() {
            if (!sessionState) {
                alert('No session active');
                return;
            }
            const code = sessionState.code || params.code;
            const audienceUrl = `audience.html?code=${code}`;
            window.open(audienceUrl, 'audience', 'width=1200,height=800');
        }

        function exportSession() {
            if (!sessionState) return;

            const exportData = {
                stories: sessionState.stories,
                config: sessionState.config
            };

            document.getElementById('importExportJson').value = JSON.stringify(exportData, null, 2);
        }

        async function copyHistory() {
            if (!sessionState || sessionState.history.length === 0) {
                await customAlert('No history to copy yet');
                return;
            }

            const historyJson = JSON.stringify(sessionState.history, null, 2);
            navigator.clipboard.writeText(historyJson).then(async () => {
                await customAlert('History copied to clipboard!');
            }).catch(async err => {
                console.error('Failed to copy:', err);
                await customAlert('Failed to copy history');
            });
        }

        async function importSession() {
            const json = document.getElementById('importExportJson').value.trim();
            if (!json) {
                await customAlert('Paste JSON first');
                return;
            }

            try {
                const data = JSON.parse(json);
                client.importSession(data.stories || [], data.config || {});
            } catch (e) {
                await customAlert('Invalid JSON: ' + e.message);
            }
        }

        function updateSessionCounts(data) {
            if (data.stories !== undefined) {
                document.getElementById('storyCount').textContent = data.stories.length;
            }
            if (data.connected_judges !== undefined) {
                document.getElementById('judgeCount').textContent = data.connected_judges.length;
            }
            if (data.audience_count !== undefined) {
                document.getElementById('audienceCount').textContent = data.audience_count;
            }
        }

        async function ejectJudges() {
            if (await customConfirm('Eject all judges? They will be disconnected with a message.')) {
                client.send('eject_judges');
            }
        }

        async function shutdownAudience() {
            if (await customConfirm('Shutdown all audience screens? They will be disconnected.')) {
                client.send('shutdown_audience');
            }
        }

        async function deleteSession() {
            if (await customConfirm('DELETE SESSION? This will eject all judges, shutdown all audience screens, and delete the session. This cannot be undone.')) {
                client.send('delete_session');
                // Redirect back to home after deletion
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            }
        }
    </script>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <div class="modal-message" id="modalMessage"></div>
            <div class="modal-buttons">
                <button class="modal-btn" id="modalOk">OK</button>
                <button class="modal-btn cancel" id="modalCancel">Cancel</button>
            </div>
        </div>
    </div>

    <script src="modal.js"></script>
</body>
</html>
