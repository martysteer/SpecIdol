<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPECULATIVE IDOL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="modal.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: var(--text-display);
            text-align: center;
            margin-bottom: 3rem;
            text-shadow: 0 0 10px #0f0, 0 0 20px #0f0;
            line-height: 1.2;
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        .mode-select {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        button {
            background: #0f0;
            color: #000;
            border: 3px solid #0f0;
            padding: 1rem 2rem;
            font-family: 'Press Start 2P', cursive;
            font-size: var(--text-body);
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        button:hover {
            background: #000;
            color: #0f0;
            box-shadow: 0 0 20px #0f0;
        }

        .join-form {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            width: 100%;
            max-width: 800px;
        }

        .join-form.active {
            display: grid;
        }

        .sessions-column, .actions-column {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .column-header {
            font-family: 'Press Start 2P', cursive;
            font-size: var(--text-heading);
            text-align: center;
            margin-bottom: 1rem;
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
        }

        input, select {
            background: #000;
            color: #0f0;
            border: 2px solid #0f0;
            padding: 0.75rem;
            font-family: 'Courier New', monospace;
            font-size: var(--text-body);
        }

        input:focus, select:focus {
            outline: none;
            box-shadow: 0 0 10px #0f0;
        }

        input[type="text"] {
            text-transform: uppercase;
            font-family: 'Press Start 2P', cursive;
            font-size: var(--text-subheading);
            text-align: center;
            letter-spacing: 0.5rem;
        }

        .error {
            color: #f00;
            text-align: center;
            padding: 0.5rem;
            display: none;
        }

        .error.active {
            display: block;
        }

        @media (max-width: 768px) {
            :root {
                --text-display: 1.5rem;   /* Scale down for mobile */
                --text-heading: 1.125rem;
                --text-subheading: 1rem;
                --text-body: 0.875rem;
                --text-caption: 0.75rem;
            }

            .join-form {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <h1>SPECULATIVE<br>IDOL</h1>

    <div class="container">
        <div class="mode-select" id="modeSelect">
            <button onclick="createSession()">Create Session</button>
            <button onclick="showJoinForm()">Join Session</button>
        </div>

        <div class="join-form" id="joinForm">
            <div class="sessions-column">
                <div class="column-header">Select Session</div>
                <div id="sessionButtons"></div>
            </div>

            <div class="actions-column">
                <div class="column-header">Join As</div>
                <button onclick="joinAsAudience()" id="joinAudienceBtn" disabled>Join as Audience</button>
                <button onclick="joinAsJudge()" id="joinJudgeBtn" disabled>Join as Judge</button>
                <button onclick="joinAsController()" id="joinControllerBtn" disabled style="background: #440; color: #ff0; border-color: #ff0; margin-top: 1rem;">Join as Controller</button>
            </div>
        </div>

        <div class="error" id="error"></div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <div class="modal-message" id="modalMessage"></div>
            <div class="modal-buttons">
                <button class="modal-btn" id="modalOk">OK</button>
                <button class="modal-btn cancel" id="modalCancel">Cancel</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script src="modal.js"></script>
    <script>
        const client = new SpecIdolClient();
        let selectedCode = null;

        client.connect();

        client.on('session_created', (data) => {
            window.location.href = `control.html?code=${data.code}`;
        });

        client.on('sessions_list', (data) => {
            renderSessions(data.sessions);
        });

        function createSession() {
            client.createSession();
        }

        function showJoinForm() {
            document.getElementById('modeSelect').style.display = 'none';
            document.getElementById('joinForm').classList.add('active');
            client.listSessions();
        }

        function renderSessions(sessions) {
            const container = document.getElementById('sessionButtons');
            if (sessions.length === 0) {
                container.innerHTML = '<div style="text-align: center; opacity: 0.7; padding: 2rem;">No active sessions</div>';
                return;
            }

            container.innerHTML = sessions.map(session => `
                <button onclick="selectSession('${session.code}')">
                    ${session.code}
                    <div style="font-family: 'Courier New', monospace; font-size: var(--text-caption); margin-top: 0.5rem; opacity: 0.7;">
                        ${session.story_count} stories | ${session.judge_count} judges | ${session.audience_count} audience
                    </div>
                </button>
            `).join('');
        }

        function selectSession(code) {
            selectedCode = code;
            document.getElementById('joinControllerBtn').disabled = false;
            document.getElementById('joinAudienceBtn').disabled = false;
            document.getElementById('joinJudgeBtn').disabled = false;
            document.querySelectorAll('#sessionButtons button').forEach(btn => {
                if (btn.textContent.includes(code)) {
                    btn.style.background = '#0f0';
                    btn.style.color = '#000';
                } else {
                    btn.style.background = '#000';
                    btn.style.color = '#0f0';
                }
            });
        }

        async function joinAsController() {
            if (!selectedCode) return;
            if (await customConfirm("Are you sure you're fair enough to seize control?")) {
                window.location.href = `control.html?code=${selectedCode}`;
            }
        }

        async function joinAsAudience() {
            if (!selectedCode) return;
            if (await customConfirm("Do you like to watch?")) {
                window.location.href = `audience.html?code=${selectedCode}`;
            }
        }

        async function joinAsJudge() {
            if (!selectedCode) return;
            if (await customConfirm("Is your opinion the truth?")) {
                window.location.href = `judge.html?code=${selectedCode}`;
            }
        }

        function showError(message) {
            const error = document.getElementById('error');
            error.textContent = message;
            error.classList.add('active');
        }

        function clearError() {
            document.getElementById('error').classList.remove('active');
        }
    </script>
</body>
</html>
